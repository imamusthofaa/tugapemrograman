<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WisataNusantara - Jelajahi Keindahan Indonesia</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5f7a;
            --secondary: #57c5b6;
            --accent: #159895;
            --dark: #0f3460;
            --light: #e8f6f3;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f6f3 100%);
            color: #333;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: var(--white);
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* Controls Section */
        .controls {
            max-width: 1200px;
            margin: -2rem auto 2rem;
            padding: 0 1rem;
            position: relative;
            z-index: 2;
        }

        .controls-inner {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(87, 197, 182, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            border: 2px solid #e0e0e0;
            background: var(--white);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            border-color: var(--secondary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .view-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e0e0e0;
            background: var(--white);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .view-btn:hover, .view-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* Stats Bar */
        .stats-bar {
            max-width: 1200px;
            margin: 0 auto 1.5rem;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666;
            font-size: 0.9rem;
        }

        .stats-bar span {
            color: var(--primary);
            font-weight: bold;
        }

        /* Content Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
        }

        /* Grid View */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* List View */
        .list-view {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Card Styles */
        .card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .card-image {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.1);
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255,255,255,0.95);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            backdrop-filter: blur(10px);
        }

        .card-favorite {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1rem;
            color: #ccc;
        }

        .card-favorite:hover {
            background: #ff6b6b;
            color: white;
        }

        .card-favorite.liked {
            background: #ff6b6b;
            color: white;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-location {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .card-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .card-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card-price span {
            font-size: 0.8rem;
            color: #999;
            font-weight: 400;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #ffa500;
            font-weight: 600;
        }

        /* List View Card Modification */
        .list-view .card {
            display: flex;
            flex-direction: row;
            height: 180px;
        }

        .list-view .card-image {
            width: 280px;
            min-width: 280px;
            height: 100%;
        }

        .list-view .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .list-view .card-description {
            -webkit-line-clamp: 3;
        }

        /* Detail Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #ff6b6b;
            color: white;
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-content {
            padding: 2rem;
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .modal-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            color: #666;
            font-size: 0.9rem;
        }

        .modal-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .modal-description {
            line-height: 1.8;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .modal-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--light);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .feature-item i {
            color: var(--secondary);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            flex: 1;
            min-width: 200px;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(21, 152, 149, 0.4);
        }

        .btn-secondary {
            padding: 1rem 2rem;
            background: var(--light);
            color: var(--primary);
            border: 2px solid var(--secondary);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: white;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .no-results i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 1rem;
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: var(--white);
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .controls-inner {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .view-toggle {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }

            .grid-view {
                grid-template-columns: 1fr;
            }

            .list-view .card {
                flex-direction: column;
                height: auto;
            }

            .list-view .card-image {
                width: 100%;
                height: 200px;
            }

            .modal-image {
                height: 200px;
            }

            .modal-content {
                padding: 1.5rem;
            }

            .modal-title {
                font-size: 1.4rem;
            }

            .modal-actions {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
            }
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>

        // DOM Elements
        const wisataList = document.getElementById('wisataList');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const viewBtns = document.querySelectorAll('.view-btn');
        const itemCount = document.getElementById('itemCount');
        const activeFilter = document.getElementById('activeFilter');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');

        // Format Rupiah
        const formatRupiah = (harga) => {
            return 'Rp ' + harga.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        };

        // Render Cards
        const renderWisata = () => {
            let filtered = wisataData.filter(item => {
                const matchSearch = item.nama.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                  item.lokasi.toLowerCase().includes(searchQuery.toLowerCase());
                const matchFilter = currentFilter === 'all' || item.kategori === currentFilter;
                return matchSearch && matchFilter;
            });

            itemCount.textContent = filtered.length;
            activeFilter.textContent = `Kategori: ${currentFilter === 'all' ? 'Semua' : currentFilter}`;

            if (filtered.length === 0) {
                wisataList.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1;">
                        <i class="fas fa-search"></i>
                        <h3>Destinasi tidak ditemukan</h3>
                        <p>Coba kata kunci atau kategori lain</p>
                    </div>
                `;
                return;
            }

            wisataList.innerHTML = filtered.map((item, index) => `
                <div class="card" onclick="openModal(${item.id})" style="animation-delay: ${index * 0.1}s">
                    <div class="card-image">
                        <img src="${item.gambar}" alt="${item.nama}" loading="lazy">
                        <span class="card-badge">${item.kategori}</span>
                        <button class="card-favorite ${favorites.has(item.id) ? 'liked' : ''}" 
                                onclick="event.stopPropagation(); toggleFavorite(${item.id})">
                            <i class="fas fa-heart"></i>
                        </button>
                    </div>
                    <div class="card-content">
                        <div class="card-location">
                            <i class="fas fa-map-marker-alt"></i> ${item.lokasi}
                        </div>
                        <h3 class="card-title">${item.nama}</h3>
                        <p class="card-description">${item.deskripsi}</p>
                        <div class="card-footer">
                            <div class="card-price">
                                ${formatRupiah(item.harga)} <span>/orang</span>
                            </div>
                            <div class="card-rating">
                                <i class="fas fa-star"></i> ${item.rating}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        // Toggle Favorite
        const toggleFavorite = (id) => {
            if (favorites.has(id)) {
                favorites.delete(id);
            } else {
                favorites.add(id);
            }
            renderWisata();
        };

        // Open Modal
        const openModal = (id) => {
            const item = wisataData.find(w => w.id === id);
            if (!item) return;

            document.getElementById('modalImage').src = item.gambar;
            document.getElementById('modalTitle').textContent = item.nama;
            document.getElementById('modalDescription').textContent = item.deskripsi;
            
            document.getElementById('modalMeta').innerHTML = `
                <span><i class="fas fa-map-marker-alt"></i> ${item.lokasi}</span>
                <span><i class="fas fa-star" style="color: #ffa500;"></i> ${item.rating} / 5.0</span>
                <span><i class="fas fa-clock"></i> ${item.jam}</span>
                <span><i class="fas fa-temperature-half"></i> ${item.suhu}</span>
                <span><i class="fas fa-tag"></i> ${formatRupiah(item.harga)}</span>
            `;

            document.getElementById('modalFeatures').innerHTML = item.fasilitas.map(f => `
                <div class="feature-item">
                    <i class="fas fa-check-circle"></i> ${f}
                </div>
            `).join('');

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        // Close Modal
        const closeModal = () => {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        };

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderWisata();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderWisata();
            });
        });

        viewBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                viewBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                wisataList.className = currentView === 'grid' ? 'grid-view' : 'list-view';
                renderWisata();
            });
        });

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        document.getElementById('btnPesan').addEventListener('click', () => {
            alert('Fitur pemesanan akan segera hadir! 🎉');
        });

        document.getElementById('btnShare').addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('modalTitle').textContent,
                    text: 'Lihat destinasi wisata menarik ini!',
                    url: window.location.href
                });
            } else {
                alert('Link berhasil disalin! 📋');
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initial Render
        renderWisata();
    </script>

</body>
</html>
