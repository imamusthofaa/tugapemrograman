<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Resto - Daftar Makanan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Filter & Search */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transform: scale(1.02);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .view-btn {
            padding: 8px 16px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .view-btn:hover, .view-btn.active {
            background: white;
            color: #667eea;
        }

        /* Grid Layout */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .menu-grid.list-view {
            grid-template-columns: 1fr;
        }

        .menu-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .menu-card .image-container {
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .menu-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .menu-card:hover img {
            transform: scale(1.1);
        }

        .menu-card .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 2;
        }

        .badge.makanan { background: #ff6b6b; color: white; }
        .badge.minuman { background: #4ecdc4; color: white; }
        .badge.dessert { background: #f9ca24; color: #333; }

        .menu-card .content {
            padding: 20px;
        }

        .menu-card h3 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 8px;
        }

        .menu-card .price {
            font-size: 1.4rem;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .menu-card .description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .menu-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #f9ca24;
            font-weight: 600;
        }

        .order-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .order-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* List View Styles */
        .menu-grid.list-view .menu-card {
            display: flex;
            flex-direction: row;
            align-items: stretch;
        }

        .menu-grid.list-view .image-container {
            width: 250px;
            min-width: 250px;
            height: auto;
        }

        .menu-grid.list-view .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #ff6b6b;
            color: white;
            transform: rotate(90deg);
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-content {
            padding: 30px;
        }

        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #333;
        }

        .modal-content .modal-price {
            font-size: 1.6rem;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-content .modal-desc {
            color: #555;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .modal-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-item .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-item .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
        }

        .modal-order-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-order-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #2ecc71;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .menu-grid.list-view .menu-card {
                flex-direction: column;
            }

            .menu-grid.list-view .image-container {
                width: 100%;
                height: 200px;
            }

            .modal-details {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .menu-card .content {
                padding: 15px;
            }

            .modal-content {
                padding: 20px;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
            animation: fadeIn 0.5s ease;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            opacity: 0.8;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Menu Resto</h1>
            <p>Temukan hidangan lezat untuk setiap selera</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari menu...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="makanan">Makanan</button>
                <button class="filter-btn" data-filter="minuman">Minuman</button>
                <button class="filter-btn" data-filter="dessert">Dessert</button>
            </div>
        </div>

        <div class="view-toggle">
            <button class="view-btn active" data-view="grid">⊞ Grid</button>
            <button class="view-btn" data-view="list">☰ List</button>
        </div>

        <div class="menu-grid" id="menuContainer"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">×</button>
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-content">
                <span class="badge" id="modalBadge"></span>
                <h2 id="modalTitle"></h2>
                <div class="modal-price" id="modalPrice"></div>
                <p class="modal-desc" id="modalDesc"></p>
                <div class="modal-details">
                    <div class="detail-item">
                        <div class="label">Rating</div>
                        <div class="value" id="modalRating"></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Kalori</div>
                        <div class="value" id="modalCalories"></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Waktu Saji</div>
                        <div class="value" id="modalTime"></div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Porsi</div>
                        <div class="value" id="modalPortion"></div>
                    </div>
                </div>
                <button class="modal-order-btn" id="modalOrderBtn">🛒 Pesan Sekarang</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage"></span>
    </div>

    <script>
        // Data Menu (JSON Statis)
        const menuData = [
            {
                id: 1,
                nama: "Nasi Goreng Spesial",
                kategori: "makanan",
                harga: 35000,
                deskripsi: "Nasi goreng dengan campuran ayam suwir, udang, telur mata sapi, dan sayuran segar. Dipadukan dengan bumbu rahasia keluarga yang kaya rasa.",
                gambar: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=500&auto=format&fit=crop",
                rating: 4.8,
                kalori: "450 kcal",
                waktu: "15 menit",
                porsi: "1 porsi"
            },
            {
                id: 2,
                nama: "Ayam Bakar Taliwang",
                kategori: "makanan",
                harga: 42000,
                deskripsi: "Ayam kampung bakar dengan bumbu khas Lombok yang pedas dan gurih. Disajikan dengan plecing kangkung dan sambal terasi.",
                gambar: "https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=500&auto=format&fit=crop",
                rating: 4.9,
                kalori: "520 kcal",
                waktu: "25 menit",
                porsi: "1 porsi"
            },
            {
                id: 3,
                nama: "Sate Ayam Madura",
                kategori: "makanan",
                harga: 30000,
                deskripsi: "Sate ayam dengan bumbu kacang khas Madura yang creamy dan manis. Dilengkapi dengan lontong dan acar timun.",
                gambar: "https://images.unsplash.com/photo-1555126634-323283e090fa?w=500&auto=format&fit=crop",
                rating: 4.7,
                kalori: "380 kcal",
                waktu: "20 menit",
                porsi: "10 tusuk"
            },
            {
                id: 4,
                nama: "Es Teh Tarik",
                kategori: "minuman",
                harga: 15000,
                deskripsi: "Teh tarik dengan teknik tarik khas yang menciptakan busa lembut. Perpaduan sempurna antara teh hitam dan susu kental manis.",
                gambar: "https://images.unsplash.com/photo-1558160074-4d7d8bdf4256?w=500&auto=format&fit=crop",
                rating: 4.6,
                kalori: "120 kcal",
                waktu: "5 menit",
                porsi: "1 gelas"
            },
            {
                id: 5,
                nama: "Avocado Smoothie",
                kategori: "minuman",
                harga: 22000,
                deskripsi: "Smoothie alpukat creamy dengan tambahan susu dan gula aren. Topping choco chip dan keju parut yang melimpah.",
                gambar: "https://images.unsplash.com/photo-1546173159-315724a31696?w=500&auto=format&fit=crop",
                rating: 4.8,
                kalori: "280 kcal",
                waktu: "7 menit",
                porsi: "1 gelas"
            },
            {
                id: 6,
                nama: "Es Kopi Susu Gula Aren",
                kategori: "minuman",
                harga: 18000,
                deskripsi: "Kopi robusta lokal dengan susu segar dan gula aren asli. Sensasi kopi yang kuat dengan after taste manis alami.",
                gambar: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500&auto=format&fit=crop",
                rating: 4.9,
                kalori: "150 kcal",
                waktu: "5 menit",
                porsi: "1 gelas"
            },
            {
                id: 7,
                nama: "Pancake Strawberry",
                kategori: "dessert",
                harga: 28000,
                deskripsi: "Pancake lembut bertumpuk tiga dengan siraman maple syrup dan potongan stroberi segar. Taburan icing sugar yang memikat.",
                gambar: "https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=500&auto=format&fit=crop",
                rating: 4.7,
                kalori: "320 kcal",
                waktu: "12 menit",
                porsi: "3 pcs"
            },
            {
                id: 8,
                nama: "Matcha Tiramisu",
                kategori: "dessert",
                harga: 32000,
                deskripsi: "Tiramisu dengan sentuhan matcha Jepang premium. Lapisan ladyfinger yang lembut dengan cream cheese matcha yang creamy.",
                gambar: "https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=500&auto=format&fit=crop",
                rating: 4.8,
                kalori: "290 kcal",
                waktu: "10 menit",
                porsi: "1 slice"
            },
            {
                id: 9,
                nama: "Chocolate Lava Cake",
                kategori: "dessert",
                harga: 30000,
                deskripsi: "Kue cokelat dengan center yang meleleh saat dipotong. Disajikan hangat dengan es krim vanilla di sampingnya.",
                gambar: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?w=500&auto=format&fit=crop",
                rating: 4.9,
                kalori: "350 kcal",
                waktu: "15 menit",
                porsi: "1 pcs"
            }
        ];

        // State
        let currentFilter = 'all';
        let currentView = 'grid';
        let searchQuery = '';

        // DOM Elements
        const menuContainer = document.getElementById('menuContainer');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const viewButtons = document.querySelectorAll('.view-btn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const toast = document.getElementById('toast');

        // Format Rupiah
        function formatRupiah(angka) {
            return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Render Menu
        function renderMenu() {
            let filtered = menuData;

            // Filter by category
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.kategori === currentFilter);
            }

            // Filter by search
            if (searchQuery) {
                filtered = filtered.filter(item => 
                    item.nama.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.deskripsi.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }

            // Clear container
            menuContainer.innerHTML = '';

            // Empty state
            if (filtered.length === 0) {
                menuContainer.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>😕 Menu tidak ditemukan</h3>
                        <p>Coba kata kunci atau kategori lain</p>
                    </div>
                `;
                return;
            }

            // Render cards
            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="image-container">
                        <img src="${item.gambar}" alt="${item.nama}" loading="lazy">
                        <span class="badge ${item.kategori}">${item.kategori}</span>
                    </div>
                    <div class="content">
                        <h3>${item.nama}</h3>
                        <div class="price">${formatRupiah(item.harga)}</div>
                        <p class="description">${item.deskripsi.substring(0, 100)}...</p>
                        <div class="meta">
                            <div class="rating">
                                <span>⭐</span>
                                <span>${item.rating}</span>
                            </div>
                            <button class="order-btn" onclick="event.stopPropagation(); showToast('\u2705 ${item.nama} ditambahkan ke keranjang!')">
                                Pesan
                            </button>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => openModal(item));
                menuContainer.appendChild(card);
            });
        }

        // Open Modal
        function openModal(item) {
            document.getElementById('modalImage').src = item.gambar;
            document.getElementById('modalTitle').textContent = item.nama;
            document.getElementById('modalPrice').textContent = formatRupiah(item.harga);
            document.getElementById('modalDesc').textContent = item.deskripsi;
            document.getElementById('modalRating').textContent = '⭐ ' + item.rating;
            document.getElementById('modalCalories').textContent = item.kalori;
            document.getElementById('modalTime').textContent = item.waktu;
            document.getElementById('modalPortion').textContent = item.porsi;

            const badge = document.getElementById('modalBadge');
            badge.textContent = item.kategori;
            badge.className = 'badge ' + item.kategori;

            document.getElementById('modalOrderBtn').onclick = () => {
                showToast(`\u2705 ${item.nama} berhasil dipesan!`);
                closeModal();
            };

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close Modal
        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Show Toast
        function showToast(message) {
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderMenu();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMenu();
            });
        });

        viewButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                viewButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;

                if (currentView === 'list') {
                    menuContainer.classList.add('list-view');
                } else {
                    menuContainer.classList.remove('list-view');
                }
            });
        });

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initial Render
        renderMenu();
    </script>
</body>
</html>
